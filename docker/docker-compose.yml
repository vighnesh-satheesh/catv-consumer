version: "3"

services:
  catvconsumer_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    environment:
      - CATV_CONSUMER_ENV_PATH=path.json
      - ALLOWED_HOSTS=*
      - C_FORCE_ROOT=1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secret/uppsala-staging-5d1de3f3e220.json
      - GCP_PROJECT_ID=uppsala-staging
      - GCP_SECRET_NAME=upp-stg-api-catv-consumer-service
    ports:
      - 8300:8000
