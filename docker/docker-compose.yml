version: "3"

services:
  catvconsumer_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    environment:
      - CATV_CONSUMER_API_ENV_PATH=/app/local.env
      - API_TOKEN_ENCRYPT_PRIVATE_KEY=/app/key.private
      - ALLOWED_HOSTS=*
      - C_FORCE_ROOT=1
    env_file:
      #Insert your env file here
      - ../local.env
    ports:
      - 8300:8000
